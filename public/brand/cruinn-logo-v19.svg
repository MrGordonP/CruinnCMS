  Square width=300. Centre=170 (square x=20, centre=170).
  Group centre should be at 170.
  Group left = 170 - 210/2 = 170 - 105 = 65.
  cx_C = 65 + 18 = 83.
  RUINN_x = 83 + 18 + 2 = 103.
  RUINN_end = 103 + 170 = 273.
  CMS_centre_x = 273 + 8 + 6 = 287.
  Group right = 287 + 6 = 293.
  Verify centre: (65+293)/2 = 179 ≈ 170. Off by 9.
  Adjust: shift left 9. cx_C=74. RUINN_x=94. RUINN_end=264. CMS_centre=278.
  Group: left=56, right=284. Centre=170. ✓

  Vertical: same as before.
  cy=158, baseline=176, rule_y=185, FA_y=197.
  CMS: C=152, M=164, S=176.
-->

