# ============================================================
# Cruinn CMS — Nginx Server Configuration
#
# Replace 'yoursite.example' with your actual domain.
# Place this in /etc/nginx/sites-available/yoursite.example
# then symlink: ln -s /etc/nginx/sites-available/yoursite.example /etc/nginx/sites-enabled/
#
# Adjust paths to match your VPS setup.
# SSL certificates managed by Certbot (Let's Encrypt).
# ============================================================

server {
    listen 80;
    server_name yoursite.example www.yoursite.example;
    return 301 https://yoursite.example$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.yoursite.example;

    ssl_certificate     /etc/letsencrypt/live/yoursite.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoursite.example/privkey.pem;

    return 301 https://yoursite.example$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yoursite.example;

    # ── SSL ────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/yoursite.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yoursite.example/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Document Root ──────────────────────────────────────────
    root /var/www/cms-portal/public;
    index index.php;

    # ── Security Headers ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-src https://www.openstreetmap.org;" always;

    # ── Logging ────────────────────────────────────────────────
    access_log /var/log/nginx/yoursite.example.access.log;
    error_log  /var/log/nginx/yoursite.example.error.log;

    # ── Upload Size ────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Static Files ───────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Block access to sensitive files ────────────────────────
    location ~ /\. {
        deny all;
    }

    location ~ /(config|migrations|src|templates|vendor)/ {
        deny all;
    }

    # ── Front Controller ───────────────────────────────────────
    # All requests that aren't static files go through index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
}
